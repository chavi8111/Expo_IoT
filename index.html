<head>

<title>Repaso Edge, Fog y Middleware</title>
<style>
:root{--bg:#f3f5f9;--card:#fff;--line:#d8e0eb;--text:#111827;--muted:#5b6678;--primary:#2563eb;--ok:#16a34a;--bad:#dc2626;}
*{box-sizing:border-box} body{margin:0;background:var(--bg);font-family:Arial,Helvetica,sans-serif;color:var(--text)}
header{position:sticky;top:0;z-index:10;background:#fff;border-bottom:1px solid var(--line);padding:14px 18px} h1{margin:0;font-size:24px} header p{margin:5px 0 0;color:var(--muted)}
.wrap{max-width:1050px;margin:0 auto;padding:16px} .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px}
.subject-card{text-align:left;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;cursor:pointer;box-shadow:0 2px 12px rgba(15,23,42,.05)} .subject-card:hover{border-color:var(--primary);background:#f8fbff} .subject-card b{font-size:19px;display:block;margin-bottom:8px} .subject-card span{color:var(--muted)}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:14px;box-shadow:0 2px 12px rgba(15,23,42,.05)} .header-card{display:flex;gap:12px;justify-content:space-between;align-items:flex-start}
.title{font-size:24px;font-weight:800;margin:0 0 8px} .meta{color:var(--muted)} .score{font-weight:900;white-space:nowrap} .progress{height:8px;background:#e8edf5;border-radius:999px;margin-top:12px;overflow:hidden} .bar{height:100%;width:0;background:linear-gradient(90deg,#2563eb,#22c55e)}
.qid{font-weight:800;color:#334155;margin-bottom:10px} .question{font-size:21px;line-height:1.45;font-weight:700;background:#fff;border:1px solid #dce3ee;border-radius:12px;padding:16px}
.option{display:grid;grid-template-columns:auto auto 1fr;gap:12px;align-items:start;border:1px solid #edf1f6;background:#fff;border-radius:14px;padding:14px;margin:10px 0;cursor:pointer} .option:hover{border-color:#9db7ff;background:#f8fbff} .option input{width:18px;height:18px;margin-top:4px} .letter{font-weight:900;font-size:18px} .otext{font-size:17px;line-height:1.45}
.option.correct{border-color:#22c55e;background:#ecfdf5} .option.wrong{border-color:#ef4444;background:#fff1f2}

.actions{position:sticky;bottom:0;background:rgba(243,245,249,.96);border-top:1px solid var(--line);padding:12px 16px} .actions-inner{max-width:1050px;margin:0 auto;display:flex;gap:10px;flex-wrap:wrap}
button.action{border:1px solid var(--line);border-radius:11px;background:#fff;padding:11px 16px;font-weight:900;cursor:pointer} button.primary{background:var(--primary);color:#fff;border-color:var(--primary)} button:disabled{opacity:.55;cursor:not-allowed}
.toast{display:none;position:fixed;left:50%;bottom:84px;transform:translateX(-50%);background:#111827;color:#fff;border-radius:14px;padding:12px 16px;z-index:30;max-width:min(92vw,560px)} .toast.show{display:block}
@media(max-width:700px){h1{font-size:20px} .wrap{padding:10px} .question{font-size:18px} .option{grid-template-columns:auto auto minmax(0,1fr)} .score{font-size:14px}}
</style>

<body>
<header><h1>Repaso Edge, Fog y Middleware</h1><p>3 materias · 21 preguntas de opción múltiple · 4 literales por pregunta</p></header>
<main class="wrap">
  <section id="home" class="grid"><button class="subject-card" data-subj="0"><b>1. Edge Computing</b><span>7 preguntas · opción múltiple</span></button><button class="subject-card" data-subj="1"><b>2. Fog Computing</b><span>7 preguntas · opción múltiple</span></button><button class="subject-card" data-subj="2"><b>3. Middleware</b><span>7 preguntas · opción múltiple</span></button></section>
  <section id="quiz" style="display:none">
    <div class="card header-card"><div><div id="subjectTitle" class="title"></div><div id="counter" class="meta"></div><div class="progress"><div id="bar" class="bar"></div></div></div><div id="score" class="score">Aciertos: 0</div></div>
    <div class="card"><h2>Enunciado</h2><div id="qid" class="qid"></div><div id="question" class="question"></div></div>
    <div class="card"><h2>Opciones</h2><div id="options"></div></div>

  </section>
</main>
<div class="actions"><div class="actions-inner"><button id="answerBtn" class="action primary" disabled>Responder</button><button id="nextBtn" class="action" disabled>Siguiente</button><button id="restartBtn" class="action" disabled>Reiniciar materia</button><button id="menuBtn" class="action">Menú</button></div></div>
<div id="toast" class="toast"></div>
<script id="quiz-data" type="application/json">{"subjects": [{"title": "Edge Computing", "questions": [{"id": "EDGE-01", "text": "¿Qué describe mejor el concepto de Edge Computing dentro de un sistema IoT?", "options": [["A", "Es un modelo donde los datos se procesan cerca del lugar donde se generan, por ejemplo en sensores, microcontroladores o gateways locales, para responder sin depender totalmente de la nube."], ["B", "Es una técnica donde todos los datos se envían sin filtrar a una nube central, incluso cuando la respuesta debe ejecutarse cerca del dispositivo."], ["C", "Es un tipo de base de datos que solo almacena información histórica y no participa en la toma de decisiones del sistema."], ["D", "Es una arquitectura donde los sensores no procesan ni envían información, sino que solo funcionan como elementos decorativos de la red."]], "answer": "A", "explanation": "Edge Computing procesa información en el borde de la red, cerca de sensores, microcontroladores o gateways locales, reduciendo dependencia de la nube."}, {"id": "EDGE-02", "text": "En Edge Computing, ¿qué papel cumplen sensores, microcontroladores y gateways locales?", "options": [["A", "Funcionan como puntos cercanos a la fuente de datos, capaces de capturar, preprocesar o tomar decisiones locales antes de enviar información a otros niveles del sistema."], ["B", "Reemplazan completamente a la red de comunicación, por lo que ningún dato puede salir del dispositivo hacia una aplicación o servidor."], ["C", "Sirven únicamente para mostrar una interfaz gráfica al usuario, sin participar en la captura ni procesamiento de datos."], ["D", "Solo se utilizan cuando el sistema no tiene sensores físicos ni actuadores conectados."]], "answer": "A", "explanation": "El borde puede estar formado por sensores inteligentes, microcontroladores y gateways locales que trabajan cerca del origen de la información."}, {"id": "EDGE-03", "text": "¿Por qué Edge Computing favorece la toma de decisiones en tiempo real?", "options": [["A", "Porque procesa los datos donde se generan y permite que el dispositivo responda de inmediato ante una condición, sin esperar todo el recorrido hacia la nube."], ["B", "Porque obliga a guardar los datos durante varios días antes de analizarlos para evitar errores en la decisión."], ["C", "Porque aumenta deliberadamente el tiempo de espera para que la red tenga más tiempo de validar cada dato."], ["D", "Porque elimina los sensores y deja que la nube invente los valores que necesita para decidir."]], "answer": "A", "explanation": "Al analizar los datos localmente, Edge Computing reduce la latencia y permite acciones inmediatas."}, {"id": "EDGE-04", "text": "¿Cómo ayuda Edge Computing cuando existe conectividad limitada o inestable?", "options": [["A", "Permite que el sistema siga funcionando de manera local aunque la conexión a internet sea lenta, inestable o se pierda temporalmente."], ["B", "Detiene todos los sensores hasta que la conexión a la nube vuelva a estar disponible al cien por ciento."], ["C", "Aumenta la dependencia de internet porque impide cualquier operación dentro de la red local."], ["D", "Borra automáticamente la información capturada cada vez que se pierde la conexión externa."]], "answer": "A", "explanation": "El procesamiento local mantiene la disponibilidad del sistema incluso si la conexión externa falla."}, {"id": "EDGE-05", "text": "¿Por qué Edge Computing reduce costos de transmisión de datos?", "options": [["A", "Porque filtra y procesa datos localmente, disminuyendo el tráfico de red, el consumo de ancho de banda y el almacenamiento innecesario en servicios externos."], ["B", "Porque duplica todos los paquetes enviados hacia la nube para asegurar que nunca se pierda información."], ["C", "Porque exige contratar más servidores remotos para analizar cada dato crudo generado por los sensores."], ["D", "Porque impide almacenar cualquier dato, incluso cuando el sistema necesita historial para análisis posterior."]], "answer": "A", "explanation": "Al no enviar todo el dato crudo a la nube, se reduce tráfico, ancho de banda y costos asociados."}, {"id": "EDGE-06", "text": "¿Qué significa la escalabilidad eficiente en Edge Computing?", "options": [["A", "Que el procesamiento puede distribuirse entre varios dispositivos o nodos del borde, evitando que un solo punto del sistema se sobrecargue."], ["B", "Que todos los dispositivos deben depender de un único servidor central aunque crezca el número de sensores."], ["C", "Que el sistema deja de aceptar nuevos nodos cuando aumenta la cantidad de datos generados."], ["D", "Que se elimina el procesamiento local para que cada sensor espere una autorización manual."]], "answer": "A", "explanation": "Distribuir el procesamiento en varios nodos permite crecer sin saturar un único recurso."}, {"id": "EDGE-07", "text": "¿Cómo se relaciona Edge Computing con privacidad, seguridad y respuesta local personalizada?", "options": [["A", "Al procesar datos localmente se reduce la exposición durante la transmisión a internet, y cada nodo puede responder según su contexto o tarea específica."], ["B", "Al enviar todos los datos sin cifrado a redes externas se mejora automáticamente la privacidad del usuario."], ["C", "Al impedir que cada nodo actúe según su entorno se logra una respuesta más personalizada."], ["D", "Al concentrar todos los datos en una nube pública sin filtros se disminuye cualquier riesgo de exposición."]], "answer": "A", "explanation": "El procesamiento local puede proteger mejor ciertos datos y permite respuestas adaptadas al entorno de cada dispositivo."}]}, {"title": "Fog Computing", "questions": [{"id": "FOG-01", "text": "¿Qué describe mejor el concepto de Fog Computing en IoT?", "options": [["A", "Es un modelo intermedio entre los dispositivos IoT y la nube, donde nodos locales reciben, filtran, almacenan o analizan datos antes de enviarlos a servicios remotos."], ["B", "Es una técnica donde cada sensor se conecta directamente a la nube sin pasar por ningún nodo local o gateway."], ["C", "Es una aplicación móvil que solo muestra gráficos, pero no participa en el flujo de datos del sistema."], ["D", "Es una arquitectura donde los dispositivos IoT trabajan aislados y nunca comparten información."]], "answer": "A", "explanation": "Fog Computing ubica procesamiento intermedio cerca de la red local, entre el borde y la nube."}, {"id": "FOG-02", "text": "¿Qué implica el procesamiento intermedio en Fog Computing?", "options": [["A", "Analizar datos en un nodo local, como un gateway o Raspberry Pi, antes de enviarlos a la nube para evitar transmitir información innecesaria."], ["B", "Enviar datos crudos directamente a la nube sin revisión, aunque la información no sea útil para el sistema."], ["C", "Eliminar todos los datos en el gateway para que la nube nunca reciba información del entorno."], ["D", "Desactivar los microcontroladores porque el procesamiento intermedio solo funciona sin hardware local."]], "answer": "A", "explanation": "El nodo fog puede filtrar o analizar datos antes de mandarlos a la nube."}, {"id": "FOG-03", "text": "¿Qué es la agregación de datos en Fog Computing?", "options": [["A", "Reunir información de varios sensores o dispositivos y organizarla en un solo punto antes de transmitirla o analizarla."], ["B", "Separar cada dato en servidores distintos para impedir que el sistema tenga una visión general."], ["C", "Duplicar todos los datos varias veces sin ordenarlos, aumentando el uso de ancho de banda."], ["D", "Eliminar la información de los sensores antes de que pueda ser agrupada o consultada."]], "answer": "A", "explanation": "La agregación permite concentrar y ordenar datos de diferentes dispositivos en un nodo local."}, {"id": "FOG-04", "text": "¿Cómo reduce Fog Computing la carga en la nube?", "options": [["A", "Filtra y procesa parte de la información cruda en la red local, por lo que la nube recibe menos datos innecesarios y usa mejor sus recursos."], ["B", "Obliga a la nube a procesar más datos crudos, incluyendo lecturas repetidas o irrelevantes."], ["C", "Impide que cualquier dato llegue a la nube, aunque sea necesario para reportes o almacenamiento histórico."], ["D", "Aumenta el número de copias de cada paquete para saturar intencionalmente los servicios remotos."]], "answer": "A", "explanation": "Al filtrar información antes de enviarla, Fog Computing optimiza el uso de la nube."}, {"id": "FOG-05", "text": "¿Por qué Fog Computing permite baja latencia local?", "options": [["A", "Porque ejecuta ciertas respuestas dentro de la red local, reduciendo el tiempo de espera frente a enviar todo a un servidor remoto."], ["B", "Porque retrasa las respuestas hasta que todos los servidores externos confirmen cada acción."], ["C", "Porque obliga a que los datos recorran más distancia antes de ser interpretados."], ["D", "Porque elimina la comunicación local entre dispositivos y aplicaciones cercanas."]], "answer": "A", "explanation": "Responder dentro de la red local disminuye la latencia y mejora la reacción del sistema."}, {"id": "FOG-06", "text": "¿Qué función cumple el almacenamiento temporal en Fog Computing?", "options": [["A", "Guardar datos localmente cuando falla la conexión a internet y sincronizarlos con la nube cuando se restablece la comunicación."], ["B", "Borrar las lecturas cada vez que se pierde conexión para evitar cualquier sincronización posterior."], ["C", "Enviar los datos únicamente a una aplicación móvil sin mantener copia local ni remota."], ["D", "Bloquear los sensores mientras la nube esté disponible, para que solo trabajen durante fallos de red."]], "answer": "A", "explanation": "El almacenamiento temporal evita pérdida de datos durante fallos de conectividad."}, {"id": "FOG-07", "text": "¿Cómo ayuda Fog Computing a la escalabilidad del sistema IoT?", "options": [["A", "Permite gestionar múltiples dispositivos desde nodos intermedios, reduciendo la dependencia directa de la nube y facilitando el crecimiento del sistema."], ["B", "Concentra todos los dispositivos en una sola conexión remota sin posibilidad de distribuir tareas."], ["C", "Impide añadir nuevos sensores cuando el gateway local ya existe."], ["D", "Hace que cada sensor necesite una cuenta independiente en la nube para funcionar."]], "answer": "A", "explanation": "Los nodos intermedios facilitan administrar más dispositivos sin cargar todo sobre la nube."}]}, {"title": "Middleware", "questions": [{"id": "MID-01", "text": "¿Qué describe mejor el concepto de Middleware dentro de un sistema IoT?", "options": [["A", "Es una capa de software que permite la comunicación e integración entre dispositivos, bases de datos, aplicaciones y servicios externos."], ["B", "Es un sensor físico que mide variables ambientales sin conectarse con aplicaciones ni bases de datos."], ["C", "Es una red eléctrica que alimenta a los dispositivos, pero no gestiona información ni comunicación."], ["D", "Es una pantalla local que solo muestra datos, sin organizar usuarios, alertas o servicios."]], "answer": "A", "explanation": "El middleware conecta componentes de software y hardware para que el sistema IoT funcione integrado."}, {"id": "MID-02", "text": "¿Qué significa que el Middleware funcione como puente entre hardware, nube y usuario?", "options": [["A", "Que conecta dispositivos físicos, servicios en la nube y aplicaciones de usuario para organizar datos, enviar alertas y facilitar la visualización."], ["B", "Que reemplaza todos los sensores y actuadores, evitando que el hardware participe en el sistema."], ["C", "Que solo guarda contraseñas, pero no permite comunicación entre componentes del sistema."], ["D", "Que bloquea el acceso del usuario para que la información nunca pueda consultarse desde una aplicación."]], "answer": "A", "explanation": "Middleware actúa como puente que une el hardware con la nube y las interfaces de usuario."}, {"id": "MID-03", "text": "¿Qué abarca la integración de servicios en Middleware?", "options": [["A", "Conectar sensores, bases de datos, aplicación móvil, notificaciones y servicios externos para que trabajen como parte de un mismo sistema."], ["B", "Separar todos los servicios para que la aplicación no pueda recibir datos desde los sensores."], ["C", "Usar únicamente almacenamiento local, sin conexión con bases de datos ni servicios externos."], ["D", "Eliminar las notificaciones porque no forman parte de la comunicación del sistema IoT."]], "answer": "A", "explanation": "La integración une diferentes componentes para que intercambien información y funciones."}, {"id": "MID-04", "text": "¿Cuál es la función de la gestión de datos en Middleware?", "options": [["A", "Organizar, almacenar y sincronizar la información generada por dispositivos IoT para consultarla en tiempo real o como historial."], ["B", "Desordenar los datos capturados para impedir que puedan analizarse después."], ["C", "Eliminar el historial del sistema cada vez que la aplicación móvil se abre."], ["D", "Cambiar los valores de los sensores por datos aleatorios antes de guardarlos."]], "answer": "A", "explanation": "La gestión de datos permite consulta en vivo, almacenamiento histórico y sincronización."}, {"id": "MID-05", "text": "¿Qué facilita la comunicación entre dispositivos y aplicaciones mediante Middleware?", "options": [["A", "Que los datos enviados por el hardware sean recibidos, interpretados y mostrados correctamente en una aplicación móvil o web."], ["B", "Que la aplicación reciba datos sin formato y no pueda interpretarlos ni mostrarlos al usuario."], ["C", "Que los dispositivos trabajen aislados, sin enviar información a ninguna interfaz."], ["D", "Que el usuario tenga que leer directamente los pines del microcontrolador sin una aplicación intermedia."]], "answer": "A", "explanation": "El middleware traduce y organiza la comunicación para que las aplicaciones puedan usar los datos del hardware."}, {"id": "MID-06", "text": "¿Qué papel tiene la autenticación y seguridad en Middleware?", "options": [["A", "Gestionar usuarios, permisos y reglas de acceso para proteger la información almacenada y controlar quién puede usar el sistema."], ["B", "Permitir que cualquier persona entre sin usuario ni contraseña para facilitar el acceso a datos privados."], ["C", "Eliminar permisos para que todos los usuarios tengan control total sobre sensores, base de datos y alertas."], ["D", "Guardar datos sensibles sin ninguna regla de protección porque la seguridad no forma parte del middleware."]], "answer": "A", "explanation": "La autenticación y los permisos ayudan a proteger el acceso y la información del sistema."}, {"id": "MID-07", "text": "¿Para qué sirven las notificaciones y alertas dentro del Middleware?", "options": [["A", "Para generar avisos automáticos cuando una variable sale de los rangos establecidos o cuando ocurre un evento importante en el sistema."], ["B", "Para impedir que el usuario se entere de cambios importantes detectados por los sensores."], ["C", "Para enviar mensajes aleatorios que no dependen de datos ni condiciones del sistema."], ["D", "Para reemplazar la base de datos y evitar almacenar cualquier registro histórico."]], "answer": "A", "explanation": "Las alertas automáticas ayudan a reaccionar cuando ocurre una condición relevante."}]}]}</script>
<script>
(function(){
'use strict';
const DATA = JSON.parse(document.getElementById('quiz-data').textContent);
const $ = id => document.getElementById(id);
const el = {home:$('home'),quiz:$('quiz'),subjectTitle:$('subjectTitle'),counter:$('counter'),bar:$('bar'),score:$('score'),qid:$('qid'),question:$('question'),options:$('options'),explanation:$('explanation'),answerBtn:$('answerBtn'),nextBtn:$('nextBtn'),restartBtn:$('restartBtn'),menuBtn:$('menuBtn'),toast:$('toast')};
let si=null, qi=0, score=0, answered=false;
function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function toast(msg){el.toast.textContent=msg;el.toast.classList.add('show');clearTimeout(toast.t);toast.t=setTimeout(()=>el.toast.classList.remove('show'),2200);}
function bindHome(){document.querySelectorAll('.subject-card').forEach(btn=>btn.addEventListener('click',()=>start(Number(btn.dataset.subj))));}
function start(idx){si=idx;qi=0;score=0;answered=false;el.home.style.display='none';el.quiz.style.display='block';el.restartBtn.disabled=false;load();window.scrollTo({top:0,behavior:'smooth'});}
function load(){const s=DATA.subjects[si];const q=s.questions[qi];answered=false;el.subjectTitle.textContent=s.title;el.counter.textContent='Pregunta '+(qi+1)+' de '+s.questions.length;el.score.textContent='Aciertos: '+score;el.bar.style.width=((qi/s.questions.length)*100)+'%';el.qid.textContent='ID: '+q.id;el.question.textContent=q.text;el.options.innerHTML=q.options.map(o=>'<label class="option" data-letter="'+o[0]+'"><input type="radio" name="resp" value="'+o[0]+'"><span class="letter">'+o[0]+')</span><span class="otext">'+esc(o[1])+'</span></label>').join('');el.explanation.textContent='Responde para ver aquí la explicación.';el.answerBtn.disabled=false;el.nextBtn.disabled=true;}
function selected(){const r=document.querySelector('input[name="resp"]:checked');return r?r.value:null;}
function answer(){if(answered)return;const q=DATA.subjects[si].questions[qi];const sel=selected();if(!sel){toast('Selecciona una opción antes de responder.');return;}answered=true;const ok=sel===q.answer;if(ok)score++;el.score.textContent='Aciertos: '+score;el.bar.style.width=(((qi+1)/DATA.subjects[si].questions.length)*100)+'%';document.querySelectorAll('.option').forEach(row=>{const l=row.dataset.letter;if(l===q.answer)row.classList.add('correct');if(l===sel&&l!==q.answer)row.classList.add('wrong');row.querySelector('input').disabled=true;});el.explanation.textContent=(ok?'✅ Correcto.':'❌ Incorrecto. Respuesta correcta: '+q.answer)+"\n\n"+q.explanation;el.answerBtn.disabled=true;el.nextBtn.disabled=false;toast(ok?'Correcto':'Incorrecto');}
function next(){const s=DATA.subjects[si];if(qi<s.questions.length-1){qi++;load();window.scrollTo({top:0,behavior:'smooth'});}else{el.nextBtn.disabled=true;el.answerBtn.disabled=true;toast('Materia finalizada. Aciertos: '+score+' de '+s.questions.length);}}
function menu(){el.quiz.style.display='none';el.home.style.display='grid';el.answerBtn.disabled=true;el.nextBtn.disabled=true;el.restartBtn.disabled=true;window.scrollTo({top:0,behavior:'smooth'});}
el.answerBtn.addEventListener('click',answer);el.nextBtn.addEventListener('click',next);el.restartBtn.addEventListener('click',()=>{if(si!==null)start(si);});el.menuBtn.addEventListener('click',menu);bindHome();
})();
</script>
</body></html>
