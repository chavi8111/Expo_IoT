<style>
:root{--bg:#f3f5f8;--card:#fff;--line:#d7dfeb;--text:#111827;--muted:#5c6678;--primary:#2563eb;--ok:#16a34a;--bad:#dc2626}
*{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,Helvetica,sans-serif} button{font:inherit}
.top{position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 18px;background:#fff;border-bottom:1px solid var(--line)}
.top h1{margin:0;font-size:24px} .top p{margin:4px 0 0;color:var(--muted);font-size:14px}
.btn{border:1px solid var(--line);border-radius:12px;background:#fff;padding:11px 16px;font-weight:800;cursor:pointer} .btn.primary{background:var(--primary);border-color:var(--primary);color:#fff} .btn:disabled{opacity:.55;cursor:not-allowed}
.wrap{max-width:1080px;margin:0 auto;padding:16px} .home{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px}
.subject{text-align:left;background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:0 3px 12px rgba(15,23,42,.06);cursor:pointer} .subject:hover{border-color:#9bb6ff;background:#f8fbff} .subject b{display:block;font-size:20px;margin-bottom:8px} .subject span{color:var(--muted)}
.card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:14px;box-shadow:0 3px 12px rgba(15,23,42,.055)} .header{display:flex;justify-content:space-between;gap:14px;align-items:flex-start}
.title{margin:0 0 8px;font-size:24px} .small{font-size:14px;color:var(--muted)} .score{font-size:17px;font-weight:900;white-space:nowrap}
.progress{margin-top:12px;height:8px;border-radius:99px;background:#e8edf5;overflow:hidden} .bar{height:100%;width:0;background:linear-gradient(90deg,#2563eb,#22c55e)}
.section{margin:0 0 12px;font-size:18px;font-weight:900} .qid{font-weight:900;color:#334155;margin-bottom:10px} .question{border:1px solid var(--line);border-radius:14px;background:#fff;padding:18px 20px;font-size:20px;line-height:1.45;font-weight:700}
.options{border:1px solid var(--line);border-radius:14px;background:#fbfcfe;padding:10px;max-height:58vh;overflow:auto} .option{display:grid;grid-template-columns:auto auto minmax(0,1fr);gap:12px;align-items:start;border:1px solid transparent;border-radius:14px;background:#fff;padding:14px;margin:8px 0;cursor:pointer} .option:hover{border-color:#b7c7ee;background:#f9fbff} .option.correct{border-color:#22c55e;background:#ecfdf5} .option.wrong{border-color:#ef4444;background:#fff1f2} .option input{width:18px;height:18px;margin-top:4px} .letter{font-weight:900;font-size:18px;min-width:28px} .otext{font-size:18px;line-height:1.45}
.expl{min-height:110px;border:1px solid var(--line);border-radius:14px;background:#fff;padding:14px;white-space:pre-wrap;line-height:1.5}
.bottom{position:sticky;bottom:0;background:rgba(243,245,248,.96);border-top:1px solid var(--line);backdrop-filter:blur(8px);display:none} .bottom.show{display:block} .bottom .inner{max-width:1080px;margin:0 auto;padding:12px 16px;display:flex;gap:10px;flex-wrap:wrap}
.menuShade{position:fixed;inset:0;z-index:30;background:rgba(15,23,42,.42);display:none} .menuShade.open{display:block} .menu{width:min(520px,94vw);max-height:92vh;overflow:auto;margin:20px auto;background:#fff;border-radius:18px;padding:16px;box-shadow:0 25px 60px rgba(0,0,0,.25)} .menuHead{display:flex;justify-content:space-between;align-items:center;gap:12px} .menuHead h2{margin:0} .menuList{display:grid;gap:8px;margin-top:12px} .menuItem{text-align:left;border:1px solid var(--line);border-radius:12px;background:#fff;padding:12px;cursor:pointer} .menuItem b{display:block} .menuItem span{color:var(--muted);font-size:12px}
.toast{position:fixed;left:50%;bottom:84px;transform:translateX(-50%);background:#111827;color:#fff;border-radius:14px;padding:12px 16px;display:none;z-index:40;box-shadow:0 18px 40px rgba(0,0,0,.28)} .toast.show{display:block}
.error{display:none;background:#fee2e2;border:1px solid #ef4444;color:#7f1d1d;border-radius:12px;padding:12px;margin-bottom:12px}
@media(max-width:720px){.top h1{font-size:19px}.top p{font-size:12px}.wrap{padding:10px}.card{padding:12px}.question{font-size:18px;padding:15px}.option{grid-template-columns:auto auto minmax(220px,1fr)}.otext{font-size:17px}}
</style>
</head>
<body>
<header class="top"><div><h1>Repaso Edge, Fog y Middleware</h1><p>3 materias · 21 preguntas · 4 literales por pregunta</p></div><button class="btn" onclick="openMenu()">Menú</button></header>
<div id="menuShade" class="menuShade"><div class="menu"><div class="menuHead"><h2>Materias</h2><button class="btn" onclick="closeMenu()">Cerrar</button></div><div class="menuList"><button class="menuItem" onclick="startSubject(0)"><b>Edge Computing</b><span>7 preguntas</span></button><button class="menuItem" onclick="startSubject(1)"><b>Fog Computing</b><span>7 preguntas</span></button><button class="menuItem" onclick="startSubject(2)"><b>Middleware</b><span>7 preguntas</span></button></div></div></div>
<main class="wrap"><div id="error" class="error"></div><section id="home" class="home"><button class="subject" onclick="startSubject(0)"><b>Edge Computing</b><span>7 preguntas</span></button><button class="subject" onclick="startSubject(1)"><b>Fog Computing</b><span>7 preguntas</span></button><button class="subject" onclick="startSubject(2)"><b>Middleware</b><span>7 preguntas</span></button></section><section id="quiz" style="display:none">
<div class="card header"><div><h2 id="subjectTitle" class="title"></h2><div id="counter" class="small"></div><div class="progress"><div id="bar" class="bar"></div></div></div><div id="score" class="score">Aciertos: 0</div></div>
<div class="card"><h3 class="section">Enunciado</h3><div id="qid" class="qid"></div><div id="question" class="question"></div></div>

</section></main>

<script>
var DATA = [{"title": "Edge Computing", "questions": [{"id": "EDGE-01", "text": "¿Qué es Edge Computing?", "options": {"A": "Un modelo donde todos los datos se procesan únicamente en servidores remotos.", "B": "Un modelo de procesamiento donde los datos se analizan cerca o en el lugar donde se generan.", "C": "Un sistema usado solo para almacenar información histórica en la nube.", "D": "Una capa de software para gestionar usuarios y permisos."}, "answer": "B", "explanation": "Edge Computing procesa la información cerca del origen de los datos, por ejemplo en sensores, microcontroladores o gateways locales."}, {"id": "EDGE-02", "text": "¿Qué ventaja principal ofrece Edge Computing frente a enviar todo directamente a la nube?", "options": {"A": "Reduce la latencia al procesar datos cerca de la fuente.", "B": "Aumenta siempre el uso de ancho de banda.", "C": "Elimina la necesidad de dispositivos locales.", "D": "Obliga a que todo funcione solo con internet estable."}, "answer": "A", "explanation": "La ventaja principal es disminuir la latencia porque el procesamiento se realiza cerca del dispositivo que genera los datos."}, {"id": "EDGE-03", "text": "¿Qué papel cumplen los dispositivos finales en Edge Computing?", "options": {"A": "Solo almacenan información sin procesarla.", "B": "Actúan como puntos de captura y pueden ejecutar procesamiento local.", "C": "Reemplazan completamente a la nube en todos los casos.", "D": "Solo sirven para mostrar reportes históricos."}, "answer": "B", "explanation": "Los dispositivos finales pueden capturar datos y realizar procesamiento básico o decisiones locales."}, {"id": "EDGE-04", "text": "¿Por qué Edge Computing ayuda cuando la conectividad es limitada?", "options": {"A": "Porque no necesita sensores.", "B": "Porque el sistema puede seguir procesando datos localmente aunque la conexión falle.", "C": "Porque bloquea el acceso a la red local.", "D": "Porque envía más datos sin filtrar."}, "answer": "B", "explanation": "Al procesar localmente, el sistema puede continuar funcionando aunque la conexión con la nube sea inestable."}, {"id": "EDGE-05", "text": "¿Cómo Edge Computing reduce el uso de ancho de banda?", "options": {"A": "Enviando todos los datos crudos a la nube.", "B": "Repitiendo la transmisión varias veces.", "C": "Filtrando o procesando datos localmente antes de enviarlos.", "D": "Eliminando la comunicación entre nodos."}, "answer": "C", "explanation": "Solo se envían datos relevantes o resultados procesados, reduciendo el tráfico hacia la nube."}, {"id": "EDGE-06", "text": "¿Qué relación tiene Edge Computing con la privacidad de datos?", "options": {"A": "Puede mejorarla al mantener datos sensibles más cerca del origen.", "B": "Siempre publica todos los datos en internet.", "C": "Impide aplicar controles de seguridad.", "D": "Obliga a compartir claves de usuario."}, "answer": "A", "explanation": "Procesar localmente puede reducir la exposición de datos sensibles durante la transmisión."}, {"id": "EDGE-07", "text": "¿En qué tipo de aplicación Edge Computing es especialmente útil?", "options": {"A": "Aplicaciones que requieren respuesta rápida, como monitoreo industrial o IoT en tiempo real.", "B": "Aplicaciones que nunca usan sensores.", "C": "Sistemas que solo imprimen documentos.", "D": "Procesos que no necesitan datos actuales."}, "answer": "A", "explanation": "Edge es útil cuando se requiere baja latencia y respuesta inmediata."}]}, {"title": "Fog Computing", "questions": [{"id": "FOG-01", "text": "¿Qué es Fog Computing?", "options": {"A": "Un modelo que coloca procesamiento y almacenamiento en nodos intermedios entre los dispositivos IoT y la nube.", "B": "Un sistema donde todo se ejecuta únicamente en sensores.", "C": "Una red que elimina los gateways.", "D": "Una técnica exclusiva para diseñar páginas web."}, "answer": "A", "explanation": "Fog Computing trabaja como una capa intermedia entre el borde y la nube."}, {"id": "FOG-02", "text": "¿Cuál es la diferencia básica entre Edge y Fog Computing?", "options": {"A": "Edge procesa cerca del dispositivo; Fog agrega nodos intermedios para coordinar, filtrar y gestionar datos.", "B": "Fog solo funciona sin dispositivos IoT.", "C": "Edge siempre necesita más servidores centrales que Fog.", "D": "Fog elimina completamente la nube."}, "answer": "A", "explanation": "Fog suele ubicarse en gateways, routers o servidores locales que coordinan varios dispositivos."}, {"id": "FOG-03", "text": "¿Qué función cumple un nodo fog?", "options": {"A": "Solo mostrar imágenes al usuario.", "B": "Recibir, filtrar, analizar o reenviar datos de varios dispositivos IoT.", "C": "Impedir la comunicación local.", "D": "Eliminar sensores del sistema."}, "answer": "B", "explanation": "Un nodo fog puede procesar y organizar datos antes de enviarlos a la nube."}, {"id": "FOG-04", "text": "¿Por qué Fog Computing mejora la escalabilidad en IoT?", "options": {"A": "Porque distribuye carga entre nodos intermedios y reduce dependencia directa de la nube.", "B": "Porque usa un solo sensor para todo.", "C": "Porque desactiva los gateways.", "D": "Porque evita que existan múltiples dispositivos."}, "answer": "A", "explanation": "La carga se distribuye, permitiendo manejar más dispositivos de forma ordenada."}, {"id": "FOG-05", "text": "¿Qué beneficio tiene Fog Computing en latencia?", "options": {"A": "Aumenta siempre el tiempo de respuesta.", "B": "Permite tomar decisiones dentro de la red local con menor retardo.", "C": "Obliga a enviar todos los datos a servidores lejanos.", "D": "Solo almacena datos antiguos."}, "answer": "B", "explanation": "Los nodos fog están cerca de los dispositivos, por eso pueden responder más rápido que la nube central."}, {"id": "FOG-06", "text": "¿Para qué sirve el almacenamiento temporal en Fog Computing?", "options": {"A": "Para guardar datos localmente si falla la conexión y sincronizarlos después.", "B": "Para borrar todos los datos al instante.", "C": "Para impedir que el sistema funcione sin internet.", "D": "Para almacenar únicamente imágenes decorativas."}, "answer": "A", "explanation": "El almacenamiento temporal permite continuidad cuando la conexión con la nube no está disponible."}, {"id": "FOG-07", "text": "¿Dónde puede ubicarse una capa Fog?", "options": {"A": "En gateways, routers, servidores locales o nodos intermedios de la red.", "B": "Solo dentro de una pantalla del usuario.", "C": "Únicamente en sensores sin comunicación.", "D": "Solo en documentos impresos."}, "answer": "A", "explanation": "Fog se implementa normalmente en nodos intermedios capaces de procesar y comunicar datos."}]}, {"title": "Middleware", "questions": [{"id": "MID-01", "text": "¿Qué es Middleware en IoT?", "options": {"A": "Una capa de software que conecta dispositivos, aplicaciones, bases de datos y servicios.", "B": "Un sensor de temperatura.", "C": "Un cable físico obligatorio.", "D": "Una técnica para apagar redes."}, "answer": "A", "explanation": "Middleware actúa como puente entre hardware, software y servicios externos."}, {"id": "MID-02", "text": "¿Qué problema ayuda a resolver el Middleware?", "options": {"A": "La falta de integración entre dispositivos, plataformas y aplicaciones.", "B": "La necesidad de eliminar todos los datos.", "C": "La obligación de usar un solo lenguaje humano.", "D": "La imposibilidad de usar sensores."}, "answer": "A", "explanation": "Middleware permite que sistemas diferentes se comuniquen mediante una capa común."}, {"id": "MID-03", "text": "¿Qué función cumple Middleware en la gestión de datos?", "options": {"A": "Organizar, almacenar, transformar o sincronizar información del sistema.", "B": "Romper la comunicación entre dispositivos.", "C": "Evitar que los datos lleguen a la aplicación.", "D": "Eliminar cualquier registro histórico."}, "answer": "A", "explanation": "Middleware facilita el manejo de datos para que puedan usarse en aplicaciones o servicios."}, {"id": "MID-04", "text": "¿Qué permite Middleware respecto a las aplicaciones móviles o web?", "options": {"A": "Que reciban e interpreten datos generados por los dispositivos IoT.", "B": "Que nunca se conecten a sensores.", "C": "Que solo funcionen sin usuarios.", "D": "Que ignoren todas las alertas."}, "answer": "A", "explanation": "Middleware traduce y organiza la información para que las aplicaciones la usen correctamente."}, {"id": "MID-05", "text": "¿Cómo se relaciona Middleware con seguridad?", "options": {"A": "Puede gestionar autenticación, permisos y acceso a datos.", "B": "Elimina todas las contraseñas obligatoriamente.", "C": "Hace que cualquier usuario acceda sin control.", "D": "Impide usar reglas de seguridad."}, "answer": "A", "explanation": "Middleware puede incluir control de usuarios, permisos y comunicación segura."}, {"id": "MID-06", "text": "¿Qué función tienen las alertas en un Middleware IoT?", "options": {"A": "Notificar eventos importantes cuando una variable supera un límite o cambia de estado.", "B": "Ocultar todos los problemas del sistema.", "C": "Eliminar sensores activos.", "D": "Bloquear toda visualización."}, "answer": "A", "explanation": "Las alertas permiten informar automáticamente condiciones importantes al usuario o al sistema."}, {"id": "MID-07", "text": "¿Por qué Middleware facilita la escalabilidad?", "options": {"A": "Porque permite agregar nuevos dispositivos o servicios sin rehacer todo el sistema.", "B": "Porque impide conectar nuevos sensores.", "C": "Porque obliga a usar una sola placa para siempre.", "D": "Porque solo sirve para sistemas pequeños."}, "answer": "A", "explanation": "Al usar una capa de integración, se pueden agregar componentes de manera más ordenada."}]}];
var subjectIndex = null, questions = [], current = 0, score = 0, answered = false;
function $(id){return document.getElementById(id);}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m];});}
function showError(msg){var e=$('error'); e.style.display='block'; e.textContent=msg;}
function toast(msg){var t=$('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toast.t); toast.t=setTimeout(function(){t.classList.remove('show');},2200);}
function openMenu(){$('menuShade').classList.add('open');}
function closeMenu(){$('menuShade').classList.remove('open');}
$('menuShade').addEventListener('click',function(e){if(e.target===$('menuShade')) closeMenu();});
function startSubject(i){try{subjectIndex=i; questions=DATA[i].questions.slice(); current=0; score=0; answered=false; $('home').style.display='none'; $('quiz').style.display='block'; $('bottom').classList.add('show'); closeMenu(); loadQuestion(); window.scrollTo({top:0,behavior:'smooth'});}catch(err){showError('Error al abrir la materia: '+err.message);}}
function loadQuestion(){var subj=DATA[subjectIndex]; var q=questions[current]; answered=false; $('subjectTitle').textContent=subj.title; $('counter').textContent='Pregunta '+(current+1)+' de '+questions.length; $('score').textContent='Aciertos: '+score; $('bar').style.width=(current/questions.length*100)+'%'; $('qid').textContent='ID: '+q.id; $('question').textContent=q.text; var html=''; var letters=['A','B','C','D']; for(var n=0;n<letters.length;n++){var l=letters[n]; html+='<label class="option" data-letter="'+l+'"><input type="radio" name="ans" value="'+l+'"><span class="letter">'+l+')</span><span class="otext">'+escapeHtml(q.options[l])+'</span></label>';} $('options').innerHTML=html; $('expl').textContent='Responde para ver aquí la explicación.'; $('answerBtn').disabled=false; $('nextBtn').disabled=true;}
function selected(){var x=document.querySelector('input[name="ans"]:checked'); return x?x.value:null;}
function respond(){if(answered)return; var q=questions[current]; var sel=selected(); if(!sel){toast('Selecciona una opción antes de responder.'); return;} var ok=sel===q.answer; answered=true; if(ok)score++; $('score').textContent='Aciertos: '+score; $('bar').style.width=((current+1)/questions.length*100)+'%'; var rows=document.querySelectorAll('.option'); for(var i=0;i<rows.length;i++){var l=rows[i].getAttribute('data-letter'); if(l===q.answer)rows[i].classList.add('correct'); if(l===sel && l!==q.answer)rows[i].classList.add('wrong'); rows[i].querySelector('input').disabled=true;} $('expl').textContent=(ok?'✅ Correcto.':'❌ Incorrecto.\nTu respuesta: '+sel+'\nCorrecta: '+q.answer)+'\n\n'+q.explanation; $('answerBtn').disabled=true; $('nextBtn').disabled=false; toast(ok?'Correcto':'Incorrecto');}
function nextQuestion(){if(current<questions.length-1){current++; loadQuestion(); window.scrollTo({top:0,behavior:'smooth'});}else{$('answerBtn').disabled=true; $('nextBtn').disabled=true; toast('Materia finalizada. Aciertos: '+score+' de '+questions.length);}}
function restartSubject(){if(subjectIndex!==null) startSubject(subjectIndex);}
window.onerror=function(msg,src,line,col,err){showError('Error JavaScript: '+msg+' línea '+line);};
</script>
