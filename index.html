<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Repaso Edge, Fog y Middleware</title>
<style>
:root{--bg:#f3f5f8;--card:#ffffff;--line:#d8e0eb;--text:#111827;--muted:#5b6678;--primary:#2563eb;--ok:#16a34a;--bad:#dc2626;--soft:#fbfcfe}
*{box-sizing:border-box}html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:Arial,Helvetica,sans-serif}button,input{font:inherit}
.top{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:12px;padding:12px 16px;background:rgba(255,255,255,.96);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
.brand{flex:1;min-width:0}.brand h1{margin:0;font-size:22px;line-height:1.08}.brand p{margin:4px 0 0;color:var(--muted);font-size:13px}
.btn{border:1px solid var(--line);background:#fff;border-radius:12px;padding:11px 16px;font-weight:800;cursor:pointer}.btn.primary{background:var(--primary);color:#fff;border-color:var(--primary)}.btn:disabled{opacity:.55;cursor:not-allowed}
.wrap{max-width:1080px;margin:0 auto;padding:16px}.home{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:14px}
.subject{background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:0 3px 14px rgba(15,23,42,.06);cursor:pointer}.subject:hover{border-color:#93b4ff;background:#f8fbff}.subject b{display:block;font-size:20px;margin-bottom:8px}.subject span{color:var(--muted);font-size:14px}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:14px;box-shadow:0 3px 14px rgba(15,23,42,.055)}.header{display:flex;justify-content:space-between;gap:14px;align-items:flex-start}
.title{margin:0 0 8px;font-size:24px}.small{font-size:14px;color:var(--muted)}.score{font-size:17px;font-weight:900;white-space:nowrap}
.progress{margin-top:12px;height:8px;background:#e8edf5;border-radius:99px;overflow:hidden}.bar{height:100%;width:0;background:linear-gradient(90deg,#2563eb,#22c55e);transition:width .25s ease}
.section{margin:0 0 12px;font-size:18px;font-weight:900}.qid{font-weight:900;color:#334155;margin-bottom:10px}
.question{border:1px solid var(--line);background:#fff;border-radius:14px;padding:18px 20px;font-size:20px;line-height:1.45;font-weight:700}
.options{border:1px solid var(--line);background:#fbfcfe;border-radius:14px;padding:10px;overflow:auto;max-height:58vh}
.option{display:grid;grid-template-columns:auto auto minmax(0,1fr);align-items:start;gap:12px;background:#fff;border:1px solid transparent;border-radius:14px;padding:14px;margin:8px 0;cursor:pointer}
.option:hover{border-color:#b7c7ee;background:#f9fbff}.option.correct{border-color:#22c55e;background:#ecfdf5}.option.wrong{border-color:#ef4444;background:#fff1f2}.option input{width:18px;height:18px;margin-top:4px}.letter{font-weight:900;font-size:18px;min-width:28px}.otext{font-size:18px;line-height:1.45}
.expl{min-height:110px;border:1px solid var(--line);border-radius:14px;background:#fff;padding:14px;white-space:pre-wrap;line-height:1.5}
.bottom{position:sticky;bottom:0;z-index:15;background:rgba(243,245,248,.96);backdrop-filter:blur(8px);border-top:1px solid var(--line)}.bottom .inner{max-width:1080px;margin:0 auto;padding:12px 16px;display:flex;gap:10px;flex-wrap:wrap}
.menuShade{position:fixed;inset:0;background:rgba(15,23,42,.42);display:none;z-index:40}.menuShade.open{display:block}.menu{width:min(520px,94vw);max-height:92vh;overflow:auto;background:#fff;border-radius:18px;box-shadow:0 25px 60px rgba(0,0,0,.25);margin:20px auto;padding:16px}.menuHead{display:flex;justify-content:space-between;align-items:center;gap:12px}.menuHead h2{margin:0;font-size:22px}.menuList{display:grid;gap:8px;margin-top:12px}.mBtn{text-align:left;border:1px solid var(--line);background:#fff;border-radius:12px;padding:12px;cursor:pointer}.mBtn:hover{background:#f8fbff;border-color:#9bb6ff}.mBtn b{display:block}.mBtn span{font-size:12px;color:var(--muted)}
.toast{position:fixed;left:50%;bottom:84px;transform:translateX(-50%);background:#111827;color:#fff;border-radius:14px;padding:12px 16px;box-shadow:0 18px 40px rgba(0,0,0,.28);display:none;z-index:60;max-width:min(90vw,560px)}.toast.show{display:block}
@media(max-width:720px){.top h1{font-size:18px}.brand p{font-size:11px}.wrap{padding:10px}.card{padding:12px}.title{font-size:21px}.question{font-size:18px;padding:15px}.option{grid-template-columns:auto auto minmax(220px,1fr)}.otext{font-size:17px}.btn{padding:10px 13px}}
</style>
</head>
<body>
<header class="top"><div class="brand"><h1>Repaso Edge, Fog y Middleware</h1><p>3 materias · 21 preguntas de opción múltiple · 4 literales por pregunta</p></div><button id="menuBtn" class="btn">Menú</button></header>
<div id="menuShade" class="menuShade"><div class="menu"><div class="menuHead"><h2>Materias</h2><button id="closeMenu" class="btn">Cerrar</button></div><div id="menuList" class="menuList"></div></div></div>
<main class="wrap"><section id="home" class="home"></section><section id="quiz" style="display:none">
<div class="card header"><div><h2 id="subjectTitle" class="title"></h2><div id="counter" class="small"></div><div class="progress"><div id="bar" class="bar"></div></div></div><div id="score" class="score">Aciertos: 0</div></div>
<div class="card"><h3 class="section">Enunciado</h3><div id="qid" class="qid"></div><div id="question" class="question"></div></div>
<div class="card"><h3 class="section">Opciones</h3><div id="options" class="options"></div></div>
<div class="card"><h3 class="section">Proceso / explicación</h3><div id="expl" class="expl">Responde para ver aquí la explicación.</div></div>
</section></main>
<div class="bottom"><div class="inner"><button id="answerBtn" class="btn primary" disabled>Responder</button><button id="nextBtn" class="btn" disabled>Siguiente</button><button id="restartBtn" class="btn" disabled>Reiniciar materia</button></div></div><div id="toast" class="toast"></div>
<script id="quiz-data" type="application/json">{"subjects":[{"title":"Edge Computing","questions":[{"id":"EDGE-01","text":"¿Qué es Edge Computing?","options":{"A":"Un modelo donde todos los datos se procesan únicamente en servidores remotos.","B":"Un modelo de procesamiento donde los datos se analizan cerca o en el lugar donde se generan.","C":"Un sistema usado solo para almacenar información histórica en la nube.","D":"Una capa de software para gestionar usuarios y permisos."},"answer":"B","explanation":"Edge Computing procesa la información cerca del origen de los datos, por ejemplo en sensores, microcontroladores o gateways locales.","number":1},{"id":"EDGE-02","text":"¿Por qué Edge Computing ayuda en la toma de decisiones en tiempo real?","options":{"A":"Porque espera a que todos los datos sean enviados a la nube antes de actuar.","B":"Porque elimina completamente la necesidad de sensores.","C":"Porque procesa los datos donde se generan y permite responder de forma inmediata.","D":"Porque solo funciona cuando la conexión a internet es estable."},"answer":"C","explanation":"Al procesar localmente, se reduce el tiempo de espera y se pueden tomar acciones sin depender de la nube.","number":2},{"id":"EDGE-03","text":"¿Qué ventaja ofrece Edge Computing cuando existe conectividad limitada o inestable?","options":{"A":"Permite que el sistema siga funcionando aunque internet sea lento, inestable o se pierda temporalmente.","B":"Hace que el sistema solo funcione si hay internet de alta velocidad.","C":"Obliga a enviar todos los datos sin procesar a la nube.","D":"Reduce la disponibilidad del sistema."},"answer":"A","explanation":"El procesamiento local mejora la disponibilidad porque el sistema puede seguir operando aun con problemas de conexión.","number":3},{"id":"EDGE-04","text":"¿Cómo Edge Computing reduce los costos de transmisión de datos?","options":{"A":"Aumentando el tráfico hacia servidores externos.","B":"Procesando localmente y reduciendo el envío de datos por la red.","C":"Eliminando todos los microcontroladores del sistema.","D":"Guardando todos los datos únicamente en servicios externos."},"answer":"B","explanation":"Al procesar los datos cerca del origen, disminuye el tráfico de red, el consumo de ancho de banda y el almacenamiento externo.","number":4},{"id":"EDGE-05","text":"¿Qué significa la escalabilidad eficiente en Edge Computing?","options":{"A":"Centralizar todo el procesamiento en un único servidor remoto.","B":"Evitar el uso de nodos locales para reducir el sistema.","C":"Distribuir el procesamiento entre varios dispositivos o nodos para evitar sobrecargas.","D":"Usar un solo sensor para todo el sistema."},"answer":"C","explanation":"La escalabilidad mejora porque el procesamiento se reparte entre varios nodos, evitando sobrecargar un único punto.","number":5},{"id":"EDGE-06","text":"¿Por qué Edge Computing mejora la privacidad y seguridad de los datos?","options":{"A":"Porque transmite todos los datos sin filtrar a internet.","B":"Porque los datos se procesan localmente y se reduce su exposición durante la transmisión.","C":"Porque no permite aplicar reglas de seguridad.","D":"Porque obliga a almacenar la información en servicios públicos."},"answer":"B","explanation":"Al reducir el envío de datos hacia internet, también disminuye el riesgo de exposición durante la transmisión.","number":6},{"id":"EDGE-07","text":"¿Qué permite la personalización y respuesta local en Edge Computing?","options":{"A":"Que cada dispositivo responda según su propio contexto o entorno.","B":"Que todos los dispositivos ejecuten exactamente la misma acción siempre.","C":"Que los nodos no puedan realizar tareas específicas.","D":"Que las decisiones se tomen únicamente desde la nube."},"answer":"A","explanation":"Cada nodo puede actuar según las condiciones de su entorno y ejecutar tareas específicas localmente.","number":7}]},{"title":"Fog Computing","questions":[{"id":"FOG-01","text":"¿Qué es Fog Computing?","options":{"A":"Un modelo de procesamiento intermedio entre los dispositivos IoT y la nube.","B":"Una técnica para eliminar completamente la nube de un sistema IoT.","C":"Un lenguaje de programación exclusivo para sensores.","D":"Una base de datos local que no se comunica con otros sistemas."},"answer":"A","explanation":"Fog Computing trabaja como una capa intermedia que recibe, filtra, almacena o analiza datos cerca de la red local antes de enviarlos a la nube.","number":1},{"id":"FOG-02","text":"¿Qué función cumple el procesamiento intermedio en Fog Computing?","options":{"A":"Enviar toda la información cruda sin revisar a la nube.","B":"Analizar datos en un nodo local antes de enviarlos a la nube.","C":"Evitar que los gateways participen en el sistema.","D":"Procesar datos únicamente después de almacenarlos en servidores externos."},"answer":"B","explanation":"Un nodo local, como un gateway o Raspberry Pi, puede analizar la información antes de enviarla y así evitar tráfico innecesario.","number":2},{"id":"FOG-03","text":"¿Qué significa la agregación de datos en Fog Computing?","options":{"A":"Eliminar los datos generados por los sensores.","B":"Separar cada sensor para que trabaje sin comunicación.","C":"Reunir información de varios sensores o dispositivos en un solo punto antes de transmitirla.","D":"Enviar datos únicamente cuando no exista conexión local."},"answer":"C","explanation":"La agregación organiza datos de varios dispositivos en un nodo intermedio antes de enviarlos a la nube.","number":3},{"id":"FOG-04","text":"¿Cómo Fog Computing reduce la carga en la nube?","options":{"A":"Duplicando toda la información en servidores remotos.","B":"Filtrando información cruda y enviando solo los datos necesarios.","C":"Evitando que los datos sean procesados en la red local.","D":"Aumentando el tráfico de red entre sensores y nube."},"answer":"B","explanation":"La nube recibe menos información innecesaria porque el nodo fog filtra y organiza los datos previamente.","number":4},{"id":"FOG-05","text":"¿Qué ventaja ofrece la baja latencia local en Fog Computing?","options":{"A":"Permite ejecutar respuestas dentro de la red local con menor tiempo de espera.","B":"Obliga a esperar siempre la respuesta de la nube.","C":"Aumenta el retardo entre sensores y actuadores.","D":"Impide actuar dentro de la red local."},"answer":"A","explanation":"Al responder dentro de la red local, el sistema puede actuar con menor latencia que si dependiera totalmente de la nube.","number":5},{"id":"FOG-06","text":"¿Para qué sirve el almacenamiento temporal en Fog Computing?","options":{"A":"Para borrar los datos cuando falla internet.","B":"Para guardar datos localmente durante una falla de conexión y sincronizarlos luego con la nube.","C":"Para impedir que los datos lleguen a la nube cuando se restablece la conexión.","D":"Para almacenar únicamente datos que no pertenecen al sistema IoT."},"answer":"B","explanation":"El nodo fog puede guardar temporalmente la información y enviarla a la nube cuando vuelva la comunicación.","number":6},{"id":"FOG-07","text":"¿Cómo Fog Computing favorece la escalabilidad del sistema IoT?","options":{"A":"Haciendo que todos los dispositivos dependan de un único sensor.","B":"Eliminando los nodos intermedios para reducir el sistema.","C":"Permitiendo gestionar múltiples dispositivos desde un nodo intermedio sin depender solo de la nube.","D":"Bloqueando la conexión entre dispositivos IoT y servicios externos."},"answer":"C","explanation":"El crecimiento del sistema se facilita porque un nodo intermedio puede gestionar varios dispositivos y reducir la dependencia directa de la nube.","number":7}]},{"title":"Middleware","questions":[{"id":"MID-01","text":"¿Qué es Middleware en un sistema IoT?","options":{"A":"Una capa de software que permite la comunicación e integración entre dispositivos, bases de datos, aplicaciones y servicios externos.","B":"Un sensor físico encargado únicamente de medir temperatura.","C":"Un modelo donde los datos se procesan solo en microcontroladores.","D":"Una red que no permite conectar aplicaciones con hardware."},"answer":"A","explanation":"Middleware actúa como puente entre el hardware, la nube, aplicaciones y servicios del sistema IoT.","number":1},{"id":"MID-02","text":"¿Qué permite la integración de servicios en Middleware?","options":{"A":"Desconectar sensores y aplicaciones para que trabajen por separado.","B":"Conectar componentes como sensores, bases de datos, aplicación móvil, notificaciones y servicios externos.","C":"Eliminar todas las bases de datos del sistema.","D":"Evitar que los servicios externos interactúen con la aplicación."},"answer":"B","explanation":"La integración permite que diferentes componentes del sistema trabajen juntos mediante una capa común.","number":2},{"id":"MID-03","text":"¿Qué función cumple la gestión de datos en Middleware?","options":{"A":"Organizar, almacenar y sincronizar la información generada por los dispositivos IoT.","B":"Eliminar los datos después de ser capturados.","C":"Impedir que los datos puedan consultarse en tiempo real.","D":"Usar los datos solo para bloquear notificaciones."},"answer":"A","explanation":"Middleware permite manejar la información para que pueda consultarse en tiempo real o como historial.","number":3},{"id":"MID-04","text":"¿Qué facilita la comunicación entre dispositivos y aplicaciones en Middleware?","options":{"A":"Que los datos del hardware sean ignorados por la aplicación.","B":"Que los datos enviados por el hardware puedan ser recibidos, interpretados y mostrados en una aplicación móvil o web.","C":"Que la aplicación funcione sin recibir datos del sistema.","D":"Que los dispositivos IoT pierdan comunicación con el usuario."},"answer":"B","explanation":"Middleware traduce y organiza los datos para que puedan ser utilizados por aplicaciones móviles o web.","number":4},{"id":"MID-05","text":"¿Para qué sirve la autenticación y seguridad en Middleware?","options":{"A":"Para permitir que cualquier usuario acceda sin restricciones.","B":"Para eliminar usuarios y permisos del sistema.","C":"Para gestionar usuarios, permisos y reglas de acceso que protegen la información.","D":"Para impedir que se almacene información de forma segura."},"answer":"C","explanation":"La autenticación y seguridad controlan quién puede acceder a la información y bajo qué permisos.","number":5},{"id":"MID-06","text":"¿Cuál es el objetivo de las notificaciones y alertas en Middleware?","options":{"A":"Generar avisos automáticos cuando una variable sale de los rangos establecidos o ocurre un evento importante.","B":"Evitar que el usuario se entere de eventos importantes.","C":"Bloquear la comunicación entre sensores y aplicaciones.","D":"Guardar los datos sin permitir ningún aviso."},"answer":"A","explanation":"Las alertas ayudan a informar automáticamente al usuario cuando ocurre una condición relevante dentro del sistema.","number":6},{"id":"MID-07","text":"¿Qué permite la visualización y acceso desde una aplicación en Middleware?","options":{"A":"Mostrar datos, estados o historial del sistema al usuario mediante una aplicación móvil o web.","B":"Ocultar toda la información generada por los dispositivos.","C":"Eliminar la comunicación con el usuario final.","D":"Evitar que la aplicación consulte datos del sistema IoT."},"answer":"A","explanation":"Middleware facilita que el usuario pueda visualizar información del sistema desde una aplicación.","number":7}]}]}</script>
<script>
const DATA = JSON.parse(document.getElementById('quiz-data').textContent);
const $ = (id) => document.getElementById(id);
const el = {home:$('home'), quiz:$('quiz'), menuShade:$('menuShade'), menuList:$('menuList'), subjectTitle:$('subjectTitle'), counter:$('counter'), bar:$('bar'), score:$('score'), qid:$('qid'), question:$('question'), options:$('options'), expl:$('expl'), answerBtn:$('answerBtn'), nextBtn:$('nextBtn'), restartBtn:$('restartBtn'), toast:$('toast')};
let subjectIndex = null, questions = [], current = 0, score = 0, answered = false;
function esc(s){return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function toast(msg){el.toast.textContent=msg;el.toast.classList.add('show');clearTimeout(toast.t);toast.t=setTimeout(()=>el.toast.classList.remove('show'),2200);}
function openMenu(){el.menuShade.classList.add('open');}
function closeMenu(){el.menuShade.classList.remove('open');}
$('menuBtn').onclick=openMenu;$('closeMenu').onclick=closeMenu;el.menuShade.addEventListener('click',e=>{if(e.target===el.menuShade)closeMenu();});
function renderHome(){el.home.innerHTML=DATA.subjects.map((s,i)=>`<div class="subject" data-i="${i}"><b>${esc(s.title)}</b><span>${s.questions.length} preguntas</span></div>`).join('');el.home.querySelectorAll('.subject').forEach(x=>x.onclick=()=>start(+x.dataset.i));}
function renderMenu(){el.menuList.innerHTML=DATA.subjects.map((s,i)=>`<button class="mBtn" data-i="${i}"><b>${esc(s.title)}</b><span>${s.questions.length} preguntas</span></button>`).join('');el.menuList.querySelectorAll('.mBtn').forEach(x=>x.onclick=()=>start(+x.dataset.i));}
function start(i){subjectIndex=i;questions=DATA.subjects[i].questions.slice();current=0;score=0;answered=false;el.home.style.display='none';el.quiz.style.display='block';el.restartBtn.disabled=false;closeMenu();load();window.scrollTo({top:0,behavior:'smooth'});}
function load(){const s=DATA.subjects[subjectIndex], q=questions[current];answered=false;el.subjectTitle.textContent=s.title;el.counter.textContent=`Pregunta ${current+1} de ${questions.length}`;el.score.textContent=`Aciertos: ${score}`;el.bar.style.width=`${(current/questions.length)*100}%`;el.qid.textContent=`ID: ${q.id}`;el.question.textContent=q.text;el.options.innerHTML=Object.entries(q.options).map(([l,t])=>`<label class="option" data-letter="${l}"><input type="radio" name="ans" value="${l}"><span class="letter">${l})</span><span class="otext">${esc(t)}</span></label>`).join('');el.expl.textContent='Responde para ver aquí la explicación.';el.answerBtn.disabled=false;el.nextBtn.disabled=true;}
function selected(){const x=el.options.querySelector('input:checked');return x?x.value:null;}
function respond(){if(answered)return;const q=questions[current];const sel=selected();if(!sel){toast('Selecciona una opción antes de responder.');return;}const ok=sel===q.answer;answered=true;if(ok)score++;el.score.textContent=`Aciertos: ${score}`;el.bar.style.width=`${((current+1)/questions.length)*100}%`;el.options.querySelectorAll('.option').forEach(row=>{const l=row.dataset.letter;if(l===q.answer)row.classList.add('correct');if(l===sel&&l!==q.answer)row.classList.add('wrong');row.querySelector('input').disabled=true;});el.expl.textContent=(ok?'✅ Correcto.':`❌ Incorrecto.\nTu respuesta: ${sel}\nCorrecta: ${q.answer}`) + '\n\n' + q.explanation;el.answerBtn.disabled=true;el.nextBtn.disabled=false;toast(ok?'Correcto':'Incorrecto');}
function next(){if(current<questions.length-1){current++;load();window.scrollTo({top:0,behavior:'smooth'});}else{el.answerBtn.disabled=true;el.nextBtn.disabled=true;toast(`Materia finalizada. Aciertos: ${score} de ${questions.length}`);}}
function restart(){if(subjectIndex!==null)start(subjectIndex);}
el.answerBtn.onclick=respond;el.nextBtn.onclick=next;el.restartBtn.onclick=restart;renderHome();renderMenu();
</script>
</body>
</html>
